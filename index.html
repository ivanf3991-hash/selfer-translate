<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>סֵפֶר תַּרְגּוּם — SEFER TRANSLATE</title>
<meta name="description" content="Professional ancient text translation — Russian & English to Hebrew"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✡</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=David+Libre:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
:root{--bg:#06060e;--card:#0c0c1a;--border:#181828;--gold:#c4964a;--goldL:#eed99a;--purple:#7c5cbf;--purpleL:#a07ee0;--text:#ddd0b0;--muted:#5a5870;--green:#5cb85c;--red:#e05c5c;--nh:56px}
body{background:var(--bg);color:var(--text);font-family:'EB Garamond',Georgia,serif;font-size:16px;min-height:100vh;overflow-x:hidden}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#e8d5a3;animation:twinkle 2.5s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.07}50%{opacity:.42}}
@keyframes shimmer{0%{background-position:-300% center}100%{background-position:300% center}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px #7c5cbf18}50%{box-shadow:0 0 50px #7c5cbf44}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.65}50%{transform:scale(1.2);opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#7c5cbf44;border-radius:2px}
/* NAV */
nav{position:sticky;top:0;z-index:200;height:var(--nh);background:rgba(6,6,14,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;gap:8px}
.nlogo{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0}
.nlogo span:last-child{font-family:'Cinzel',serif;font-weight:900;font-size:.86rem;letter-spacing:.18em;background:linear-gradient(135deg,#eed99a,#c4964a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nlinks{display:flex;gap:2px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nlinks::-webkit-scrollbar{display:none}
.nl{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.06em;color:var(--muted);cursor:pointer;transition:color .2s;background:none;border:none;white-space:nowrap;padding:5px 9px;border-radius:5px;-webkit-tap-highlight-color:transparent}
.nl:hover,.nl.on{color:var(--gold)}.nl.on{background:rgba(196,150,74,.08)}
.lsw{display:flex;gap:4px;flex-shrink:0}
.lb{padding:4px 8px;border-radius:5px;font-size:.66rem;font-family:'Cinzel',serif;cursor:pointer;transition:all .2s;border:1px solid #252535;background:transparent;color:var(--muted)}
.lb.on,.lb:hover{border-color:var(--gold);color:var(--goldL);background:rgba(196,150,74,.13)}
/* API BANNER */
#apib{background:linear-gradient(135deg,rgba(124,92,191,.14),rgba(196,150,74,.07));border-bottom:1px solid #7c5cbf44;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:relative;z-index:1}
.abt{flex:1;font-size:.8rem;color:var(--purpleL);min-width:160px}
.abi{flex:1;min-width:180px;padding:7px 12px;border-radius:6px;background:rgba(0,0,0,.3);border:1px solid #7c5cbf55;color:var(--text);font-family:'Courier New',monospace;font-size:.78rem;outline:none}
.abi:focus{border-color:var(--gold)}.abi::placeholder{color:#444}
/* PAGES */
.pg{display:none;position:relative;z-index:1}.pg.on{display:block;animation:fadeUp .5s ease}
/* HERO */
.hero{min-height:calc(100vh - var(--nh));display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 18px 40px;background:radial-gradient(ellipse at 50% 30%,#160a2e33 0%,transparent 68%)}
.hbadge{display:inline-block;padding:5px 15px;border-radius:20px;border:1px solid #7c5cbf44;background:rgba(124,92,191,.08);font-family:'Cinzel',serif;font-size:.6rem;color:var(--purpleL);letter-spacing:.18em;margin-bottom:22px}
.hstar{font-size:clamp(38px,8vw,54px);margin-bottom:16px;animation:glow 3.5s ease-in-out infinite;display:block}
.htitle{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.7rem,8vw,4rem);letter-spacing:.1em;margin-bottom:14px;background:linear-gradient(135deg,#eed99a 0%,#c4964a 38%,#eed99a 62%,#d4a853 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 5s linear infinite}
.hdesc{max-width:500px;color:#b0a090;line-height:1.85;margin-bottom:30px;font-size:clamp(.88rem,2.5vw,1.02rem)}
.hbtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
/* STATS */
.sbar{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:rgba(12,12,26,.7)}
.si{padding:16px 8px;text-align:center}.si+.si{border-inline-start:1px solid var(--border)}
.sv{font-family:'Cinzel',serif;font-size:clamp(1.1rem,4vw,1.7rem);color:var(--gold);font-weight:700}
.sl{font-size:.6rem;color:var(--muted);margin-top:3px;letter-spacing:.07em}
/* FEATURES */
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:36px 14px;max-width:880px;margin:0 auto}
.fc{background:rgba(124,92,191,.04);border:1px solid var(--border);border-radius:12px;padding:20px 14px;text-align:center;transition:all .3s}
.fc:hover{border-color:#7c5cbf66;background:rgba(124,92,191,.09)}
.fi{font-size:26px;margin-bottom:9px}.ft{font-family:'Cinzel',serif;font-size:.78rem;color:var(--gold);letter-spacing:.07em;margin-bottom:5px}.fd{font-size:.76rem;color:var(--muted);line-height:1.6}
/* BUTTONS */
.btn{cursor:pointer;border:none;transition:all .25s;font-family:'Cinzel',serif;letter-spacing:.1em;-webkit-tap-highlight-color:transparent}
.btn:hover:not(:disabled){filter:brightness(1.12);transform:translateY(-1px)}.btn:active:not(:disabled){transform:translateY(0)}.btn:disabled{opacity:.45;cursor:not-allowed}
.bp{padding:13px 34px;border-radius:8px;background:linear-gradient(135deg,#7c5cbf,#4a2e90);color:var(--goldL);font-size:.88rem;box-shadow:0 5px 26px rgba(124,92,191,.35)}
.bg{padding:12px 26px;border-radius:8px;background:rgba(196,150,74,.1);border:1px solid #c4964a55;color:var(--gold);font-size:.82rem}
.bd{padding:12px 30px;border-radius:8px;background:linear-gradient(135deg,#c4964a,#8a5e20);color:#08080f;font-size:.86rem;font-weight:700}
.bo{padding:9px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.76rem}
.bdn{border:1px solid #e05c5c33;color:var(--red);background:transparent;padding:9px;border-radius:8px;font-size:.76rem}
.bb{width:100%;display:block;text-align:center}.bs{padding:7px 13px;border-radius:6px;font-size:.7rem}
/* WRAP */
.wr{max-width:740px;margin:0 auto;padding:30px 14px 60px}
.st{font-family:'Cinzel',serif;color:var(--gold);text-align:center;margin-bottom:20px;font-size:1.08rem;letter-spacing:.15em}
/* FORM */
.inp{width:100%;padding:9px 13px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none;transition:border .2s}
.inp:focus{border-color:var(--gold)}textarea.inp{line-height:1.8;resize:vertical}
.il{font-size:.66rem;color:var(--muted);font-family:'Cinzel',serif;letter-spacing:.1em;display:block;margin-bottom:4px}
.fld{margin-bottom:12px}
/* MODE TABS */
.mtabs{display:flex;gap:7px;justify-content:center;margin-bottom:16px}
.mt{padding:6px 18px;border-radius:6px;border:1px solid #252535;background:transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.06em;cursor:pointer;transition:all .2s}
.mt.on{border-color:var(--gold);background:rgba(196,150,74,.1);color:var(--goldL)}
/* DROP */
.drop{border:2px dashed #252545;border-radius:12px;padding:36px 22px;text-align:center;cursor:pointer;background:rgba(124,92,191,.02);transition:all .3s;margin-bottom:12px}
.drop:hover,.drop.over{border-color:var(--gold);background:rgba(196,150,74,.04)}
.drop.busy{border-color:var(--purple);cursor:default}.drop.ok{border-color:var(--green)}
.di{font-size:34px;margin-bottom:9px}.dt{color:var(--gold);font-family:'Cinzel',serif;font-size:.86rem;margin-bottom:5px}.ds{color:var(--muted);font-size:.74rem}
.dvdr{display:flex;align-items:center;gap:9px;margin:11px 0}
.dvdr-l{flex:1;height:1px;background:var(--border)}.dvdr-t{font-size:.66rem;color:var(--muted);font-family:'Cinzel',serif;letter-spacing:.1em}
.tm{display:flex;justify-content:space-between;padding:4px 2px;font-size:.7rem;color:var(--muted);margin-top:3px}
/* STAT CARDS */
.scg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:20px}
.sc{background:rgba(124,92,191,.06);border:1px solid var(--border);border-radius:9px;padding:13px 8px;text-align:center}
.sci{font-size:19px}.scv{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--gold);margin:3px 0 2px}.scl{font-size:.6rem;color:var(--muted);letter-spacing:.07em}
/* PASS LIST */
.pl{border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:16px}
.plh{padding:8px 14px;background:rgba(196,150,74,.06);border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);letter-spacing:.12em}
.pi{display:flex;align-items:center;gap:11px;padding:9px 14px}.pi+.pi{border-top:1px solid #0c0c18}
.pb{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.pn{font-family:'Cinzel',serif;font-size:.74rem}
/* PROGRESS */
.pw{margin-bottom:20px}.ph{display:flex;justify-content:space-between;margin-bottom:7px}
.plb{font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold);letter-spacing:.1em}.pv{font-size:.76rem;color:var(--purple)}
.pt{height:6px;background:#0e0e1c;border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;background:linear-gradient(90deg,#7c5cbf,#c4964a);transition:width .9s ease}
/* CUR CARD */
.cc{border:1px solid #c4964a44;border-radius:11px;padding:13px 15px;margin-bottom:14px;background:rgba(196,150,74,.03)}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.ct{font-family:'Cinzel',serif;font-size:.76rem;color:var(--gold)}.cp{font-size:.68rem;color:var(--purple)}
.pd{display:flex;gap:4px;align-items:center}
.dot{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;transition:all .3s}
.con{width:7px;height:1px;background:#1a1a2a}.br{display:flex;gap:5px;margin-top:9px}
.bar{flex:1;height:3px;border-radius:2px;background:#111;transition:background .4s}
/* PAGE LIST */
.pgl{max-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.pgr{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,.01);transition:all .3s;direction:ltr}
.pgr.cur{border-color:#7c5cbf55;background:rgba(124,92,191,.06)}.pgr.dn{border-color:#5cb85c22;background:rgba(92,184,92,.02)}
.pn2{width:19px;height:19px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.56rem;border:1px solid #1c1c28;background:#0c0c18;color:#444;transition:all .3s}
.pn2.cur{border-color:#7c5cbf55;background:#7c5cbf1a;color:#9b7fd4}.pn2.dn{border-color:#5cb85c55;background:#5cb85c1a;color:#5cb85c}
.pl2{font-size:.72rem;color:#444;flex:1;transition:color .3s}.pl2.cur{color:var(--text)}.pl2.dn{color:#888}
.pdd{display:flex;gap:3px}
/* DONE */
.dh{text-align:center;margin-bottom:22px}.ds2{font-size:42px;margin-bottom:7px}
.dt2{font-family:'Cinzel',serif;color:var(--gold);font-size:1.2rem;letter-spacing:.12em;margin-bottom:4px}
.dsb{color:var(--purple);font-size:.73rem;letter-spacing:.1em}
.dsg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.ds3{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:7px;padding:10px 4px;text-align:center}
.dsv{font-family:'Cinzel',serif;font-size:1.05rem}.dsl{font-size:.54rem;color:var(--muted);margin-top:2px}
.prbx{border:1px solid #c4964a33;border-radius:9px;overflow:hidden;margin-bottom:11px}
.prhd{padding:7px 13px;background:rgba(196,150,74,.06);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.prl{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);letter-spacing:.1em}.prb{font-size:.63rem;color:var(--purple)}
.prbd{padding:13px 15px;direction:rtl;text-align:right;font-family:'David Libre','EB Garamond',serif;font-size:.93rem;line-height:2;color:var(--text);max-height:210px;overflow-y:auto;background:rgba(0,0,0,.1);white-space:pre-wrap}
details summary{list-style:none;user-select:none;cursor:pointer;color:var(--purple);font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;padding:6px 0}
details summary::-webkit-details-marker{display:none}
.byl{display:flex;flex-direction:column;gap:6px;margin-top:8px;max-height:230px;overflow-y:auto}
.byi{border:1px solid var(--border);border-radius:7px;overflow:hidden}
.byh{padding:4px 11px;background:rgba(124,92,191,.07);font-size:.64rem;color:var(--purple);font-family:'Cinzel',serif;direction:ltr}
.byb{padding:7px 11px;direction:rtl;text-align:right;font-family:'David Libre',serif;font-size:.83rem;color:#b0a090;line-height:1.85}
.dlr{display:flex;gap:7px;flex-wrap:wrap}
/* HISTORY */
.he{text-align:center;padding:48px 18px;color:var(--muted)}
.hg{display:flex;flex-direction:column;gap:9px}
.hc{border:1px solid var(--border);border-radius:11px;overflow:hidden;background:rgba(124,92,191,.03);transition:all .3s}
.hc:hover{border-color:#7c5cbf55;background:rgba(124,92,191,.07)}
.hch{display:flex;justify-content:space-between;align-items:center;padding:11px 15px;border-bottom:1px solid var(--border)}
.hct{font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold)}.hcd{font-size:.66rem;color:var(--muted)}
.hcm{display:flex;gap:12px;padding:7px 15px;font-size:.66rem;color:var(--muted)}.hcm span{color:var(--purple)}
.hcb{padding:9px 15px;direction:rtl;text-align:right;font-family:'David Libre',serif;font-size:.83rem;color:#a09080;line-height:1.65;max-height:72px;overflow:hidden}
.hcf{padding:7px 15px;display:flex;gap:6px;justify-content:flex-end;border-top:1px solid var(--border);background:rgba(0,0,0,.1)}
/* GLOSSARY */
.gtb{display:flex;gap:7px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.gcs{padding:8px 11px;background:#0c0c1a;border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:.8rem;cursor:pointer;min-width:110px}
.gst{display:flex;gap:12px;margin-bottom:12px;font-size:.68rem;color:var(--muted);font-family:'Cinzel',serif;letter-spacing:.06em}.gst span{color:var(--purple)}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:9px}
.gch{grid-column:1/-1;font-family:'Cinzel',serif;font-size:.66rem;color:var(--purple);letter-spacing:.15em;padding:4px 0 3px;border-bottom:1px solid var(--border);margin-top:5px}
.gc{border:1px solid var(--border);border-radius:9px;padding:11px 13px;cursor:pointer;transition:all .25s;background:rgba(124,92,191,.03)}
.gc:hover{border-color:#7c5cbf55;background:rgba(124,92,191,.08)}
.go{font-size:.72rem;color:var(--muted);margin-bottom:4px;font-family:'Cinzel',serif}
.ghe{direction:rtl;text-align:right;font-family:'David Libre',serif;font-size:1.08rem;color:var(--goldL)}
.gno{font-size:.68rem;color:var(--muted);font-style:italic;margin-top:3px}
/* MODAL */
#gmod{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:14px}
.mbox{background:#0c0c1a;border:1px solid var(--border);border-radius:13px;padding:22px 18px;width:100%;max-width:460px;max-height:85vh;overflow-y:auto}
.mhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mt2{font-family:'Cinzel',serif;color:var(--gold);font-size:.88rem;letter-spacing:.1em}
.mcl{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;line-height:1;padding:4px}
/* ABOUT */
.abh{text-align:center;margin-bottom:36px}.abi2{font-size:38px;margin-bottom:11px}
.abt2{font-family:'Cinzel',serif;color:var(--gold);font-size:clamp(1.05rem,4vw,1.75rem);letter-spacing:.12em;margin-bottom:9px}
.abdv{width:48px;height:1px;background:linear-gradient(90deg,transparent,#c4964a,transparent);margin:0 auto}
.abp{line-height:1.9;color:#b8a898;font-size:.95rem;margin-bottom:14px;padding-inline-start:15px;border-inline-start:2px solid #7c5cbf2a}
.tbx{border:1px solid var(--border);border-radius:11px;overflow:hidden;margin:24px 0}
.tbh{padding:9px 17px;background:rgba(196,150,74,.06);border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:.71rem;color:var(--gold);letter-spacing:.12em}
.tri{padding:10px 17px;font-size:.84rem;color:#a09080;line-height:1.5}.tri+.tri{border-top:1px solid #0c0c18}
/* FOOTER */
footer{border-top:1px solid var(--border);padding:16px 18px;text-align:center;background:rgba(6,6,14,.85);position:relative;z-index:1}
.fi2{font-size:13px;margin-bottom:4px}.ft2{font-size:.63rem;color:#2a2a3a;font-family:'Cinzel',serif;letter-spacing:.15em}.fs{font-size:.6rem;color:#1e1e2e;margin-top:3px;font-style:italic}
/* TOAST */
#toast{position:fixed;bottom:18px;inset-inline-end:14px;z-index:999;background:rgba(12,12,24,.97);border:1px solid var(--purple);border-radius:8px;padding:9px 14px;font-family:'Cinzel',serif;font-size:.73rem;color:var(--goldL);opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;max-width:calc(100vw - 28px)}
#toast.on{opacity:1;transform:translateY(0)}
/* MOBILE */
@media(max-width:580px){
  nav{padding:0 8px}
  .nl{font-size:.62rem;padding:4px 7px;letter-spacing:0}
  .lb{padding:3px 6px;font-size:.6rem}
  .hbtns{flex-direction:column;align-items:stretch}.hbtns .btn{text-align:center}
  .sbar{grid-template-columns:repeat(2,1fr)}
  .dsg{grid-template-columns:repeat(2,1fr)}
  .dlr{flex-direction:column}.dlr .btn{flex:none!important;min-width:unset!important}
  .gg{grid-template-columns:1fr}
  #apib{flex-direction:column;align-items:stretch}
}
</style>
</head>
<body>
<div id="stars"></div>
<div id="toast"></div>

<nav>
  <div class="nlogo" onclick="go('home')"><span style="font-size:17px">✡</span><span>SEFER</span></div>
  <div class="nlinks">
    <button class="nl on" id="nl-home"      onclick="go('home')">—</button>
    <button class="nl"    id="nl-translate"  onclick="go('translate')">—</button>
    <button class="nl"    id="nl-history"    onclick="go('history')">—</button>
    <button class="nl"    id="nl-glossary"   onclick="go('glossary')">—</button>
    <button class="nl"    id="nl-about"      onclick="go('about')">—</button>
  </div>
  <div class="lsw">
    <button class="lb"    onclick="setLang('he')">עב</button>
    <button class="lb on" onclick="setLang('ru')">Ру</button>
    <button class="lb"    onclick="setLang('en')">En</button>
  </div>
</nav>

<div id="apib">
  <div class="abt" id="api-t">—</div>
  <input class="abi" id="api-inp" type="password" placeholder="sk-ant-api03-..." oninput="saveKey()"/>
  <button class="btn bs" id="api-sv" onclick="saveKey()" style="padding:8px 15px;border-radius:6px;background:linear-gradient(135deg,#7c5cbf,#4a2e90);color:var(--goldL);font-size:.7rem">—</button>

const DEMO_RU=`ספר הזוהר — Книга Зоар. Глава Берешит.\n\nВ начале Творец создал высший и низший миры. Буква «Бет», с которой начинается Тора, указывает на два мира — духовный и материальный. Всё, что сотворено в высшем мире, имеет корень в нижнем. Как наверху, так и внизу — закон духовного подобия.\n\nРабби Шимон сказал: когда Творец создавал миры, Он скрыл изначальный Свет — тот, которым праведники будут наслаждаться в будущем мире. Этот свет спрятан от обычных людей. Но мудрецы, поднявшиеся в своих свойствах, удостоились почувствовать его касание.\n\nВся Тора — великое Имя Творца. Каждая буква содержит тайну. Изучающий Тору с чистым сердцем привлекает высший свет, который преобразует душу. «Душа человека — свет Господень».\n\nТайна десяти Сфирот: Кетер — воля Творца, Хохма — мудрость, Бина — понимание. От них семь нижних Сфирот строят мироздание. Все они связаны как звенья цепи. Всякое действие человека внизу находит отклик вверху.`;

function prepare(){bodyTxt=document.getElementById('ta').value;if(!bodyTxt.trim())return;const ws=bodyTxt.trim().split(/\s+/);pages=[];for(let i=0;i<ws.length;i+=300)pages.push(ws.slice(i,i+300).join(' '));rows=pages.map(()=>({text:'',passes:{},status:'pending'}));const s=t();document.getElementById('rdy-s').innerHTML=[{v:pages.length,l:s.rdyS[0].l,i:s.rdyS[0].i},{v:'4',l:s.rdyS[1].l,i:s.rdyS[1].i},{v:'5',l:s.rdyS[2].l,i:s.rdyS[2].i}].map(x=>`<div class="sc"><div class="sci">${x.i}</div><div class="scv">${x.v}</div><div class="scl">${x.l}</div></div>`).join('');$('start-b',s.startB+' '+pages.length+' '+s.rdyS[0].l.toLowerCase());setPhase('ready');}
async function startWork(){cancelled=false;setPhase('work');rows=pages.map(()=>({text:'',passes:{},status:'pending'}));const key=getKey();for(let i=0;i<pages.length;i++){if(cancelled)break;cPg=i;rows[i].status='working';rWork();const tr=await trPage(pages[i],i+1,pages.length,(pi,st)=>{rows[i].passes={...rows[i].passes,[PC[pi].id]:st};cPs=pi;rWork();},key);if(cancelled)break;rows[i].text=tr;rows[i].status='done';rWork();await sleep(150);}cPg=null;cPs=null;finalize();}
function rWork(){const s=t();const done=rows.filter(r=>r.status==='done').length;const pct=pages.length?Math.round(done/pages.length*100):0;$('prog-v',done+'/'+pages.length+' · '+pct+'%');document.getElementById('prog-f').style.width=pct+'%';const card=document.getElementById('cc');if(cPg!==null&&cPg<pages.length){card.style.display='block';$('cc-t','📄 '+s.pgW+' '+(cPg+1)+' '+s.ofW+' '+pages.length);$('cc-p',cPs!==null?s.passes[cPs]:'...');const rp=rows[cPg]?.passes||{};document.getElementById('cc-d').innerHTML=PC.map((p,i)=>`<div class="dot" style="border:2px solid ${rp[p.id]?p.c:'#252535'};background:${rp[p.id]==='done'?p.c+'33':rp[p.id]==='running'?p.c+'22':'transparent'};color:${rp[p.id]==='done'?p.c:'#555'};${rp[p.id]==='running'?'animation:pulse 1s ease-in-out infinite':''}">${rp[p.id]==='done'?'✓':rp[p.id]==='running'?'●':i+1}</div>${i<3?'<div class="con"></div>':''}`).join('');document.getElementById('cc-br').innerHTML=PC.map(p=>{const st=rp[p.id];return`<div class="bar" style="background:${st==='done'?p.c:st==='running'?p.c+'55':'#111'}"></div>`;}).join('');}else{card.style.display='none';}document.getElementById('pgl').innerHTML=rows.map((r,i)=>`<div class="pgr ${i===cPg?'cur':r.status==='done'?'dn':''}"><div class="pn2 ${i===cPg?'cur':r.status==='done'?'dn':''}">${r.status==='done'?'✓':i===cPg?'●':i+1}</div><span class="pl2 ${i===cPg?'cur':r.status==='done'?'dn':''}">${s.pgW} ${i+1}</span>${r.status==='done'?`<div class="pdd">${PC.map(p=>`<div style="width:5px;height:5px;border-radius:50%;background:${p.c}"></div>`).join('')}</div>`:''}</div>`).join('');}

async function trPage(src,pn,total,onPass,key){let cur=src;const sys='אתה מומחה לתרגום טקסטים עתיקים מרוסית ואנגלית לעברית מודרנית. דיוק מוחלט, יופי ספרותי, שמירה על עומק רוחני. אל תשמיט שום קטע. החזר רק את הטקסט המתורגם.'+buildGlP();for(let i=0;i<4;i++){onPass(i,'running');try{const msgs=i===0?[{role:'user',content:`טקסט (עמוד ${pn}/${total}):\n\n${src}\n\n${PP[i]}`}]:[{role:'user',content:`טקסט מקורי:\n\n${src}`},{role:'assistant',content:cur},{role:'user',content:PP[i]}];const hdrs={'Content-Type':'application/json'};if(key)hdrs['x-api-key']=key;const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:hdrs,body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,messages:msgs})});const data=await res.json();const txt=data.content?.map(c=>c.text||'').join('').trim();if(txt)cur=txt;onPass(i,'done');}catch{onPass(i,'error');}await sleep(300);}return cur;}

async function bPdf(text,src){if(!window.jspdf)await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),M=22;doc.setFillColor(7,7,15);doc.rect(0,0,W,H,'F');doc.setFontSize(9);doc.setTextColor(124,92,191);doc.text('SEFER TRANSLATE',W/2,30,{align:'center'});doc.setFontSize(20);doc.setTextColor(196,150,74);doc.text('סֵפֶר תַּרְגּוּם',W/2,50,{align:'center'});doc.setFontSize(11);doc.setTextColor(180,160,120);doc.text(src||'Ancient Text',W/2,65,{align:'center'});doc.setFontSize(8);doc.setTextColor(100,90,70);doc.text(new Date().toLocaleDateString()+' · 4-Pass Engine',W/2,78,{align:'center'});doc.text('דיוק · שירה · משמעות',W/2,86,{align:'center'});doc.addPage();doc.setFontSize(11);doc.setTextColor(30,20,10);let y=M;for(const line of text.split('\n')){if(!line.trim()){y+=5;continue;}const wrapped=doc.splitTextToSize(line,W-M*2);for(const wl of wrapped){if(y+8>H-M){doc.addPage();y=M;}doc.text(wl,W-M,y,{align:'right'});y+=7;}y+=2;}dl(URL.createObjectURL(doc.output('blob')),`sefer_${Date.now()}.pdf`);}

function loadGl(){try{const s=localStorage.getItem(KG);gl=s?JSON.parse(s):JSON.parse(JSON.stringify(DEF_GL));if(!s)localStorage.setItem(KG,JSON.stringify(gl));}catch{gl=JSON.parse(JSON.stringify(DEF_GL));}}
function saveGl(){try{localStorage.setItem(KG,JSON.stringify(gl));}catch{};}
function getCats(){return[...new Set(gl.map(g=>g.category))].sort();}
function renderGl(){const s=t();const srch=(document.getElementById('gl-s')?.value||'').toLowerCase();const cat=document.getElementById('gl-c')?.value||'';const cats=['',...getCats()];const cs=document.getElementById('gl-c');const pv=cs.value;cs.innerHTML=cats.map(c=>`<option value="${c}">${c||s.glAll}</option>`).join('');cs.value=pv;document.getElementById('catl').innerHTML=getCats().map(c=>`<option value="${c}">`).join('');const filtered=gl.filter(g=>{const ms=!srch||g.original.toLowerCase().includes(srch)||g.hebrew.includes(srch)||(g.note||'').toLowerCase().includes(srch);const mc=!cat||g.category===cat;return ms&&mc;});$('gl-cn',gl.length);$('gl-cc',getCats().length);const grid=document.getElementById('gl-g');const empty=document.getElementById('gl-em');if(!filtered.length){grid.innerHTML='';empty.style.display='block';return;}empty.style.display='none';const grouped={};filtered.forEach(g=>{if(!grouped[g.category])grouped[g.category]=[];grouped[g.category].push(g);});grid.innerHTML=Object.entries(grouped).map(([cat,terms])=>`<div class="gch">${cat} <span style="color:var(--muted);font-size:.6rem">(${terms.length})</span></div>${terms.map(g=>`<div class="gc" onclick="openMod(${g.id})"><div class="go">${g.original}</div><div class="ghe">${g.hebrew}</div>${g.note?`<div class="gno">${g.note}</div>`:''}</div>`).join('')}`).join('');}
function openMod(id){editId=id||null;const s=t();const g=id?gl.find(x=>x.id===id):null;$('mod-t',id?s.glEdit:s.glAdd);$('ml-o',s.glO);$('ml-h',s.glH);$('ml-c',s.glC);$('ml-n',s.glN);$('m-sv',s.glSv);document.getElementById('m-o').value=g?.original||'';document.getElementById('m-h').value=g?.hebrew||'';document.getElementById('m-c').value=g?.category||'';document.getElementById('m-n').value=g?.note||'';document.getElementById('m-dl').style.display=id?'block':'none';document.getElementById('gmod').style.display='flex';document.getElementById('m-o').focus();}
function closeMod(){document.getElementById('gmod').style.display='none';editId=null;}
document.getElementById('gmod').addEventListener('click',function(e){if(e.target===this)closeMod();});
function saveTerm(){const o=document.getElementById('m-o').value.trim();const h=document.getElementById('m-h').value.trim();const c=document.getElementById('m-c').value.trim()||'Общее';const n=document.getElementById('m-n').value.trim();if(!o||!h)return;if(editId){const idx=gl.findIndex(g=>g.id===editId);if(idx>=0)gl[idx]={...gl[idx],original:o,hebrew:h,category:c,note:n};}else gl.push({id:Date.now(),original:o,hebrew:h,category:c,note:n});saveGl();closeMod();renderGl();toast(t().glSvd);}
function delTerm(){if(!editId||!confirm(t().glD))return;gl=gl.filter(g=>g.id!==editId);saveGl();closeMod();renderGl();}

// TOAST
let tT;function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('on'),2800);}

// INIT
loadHist();loadGl();renderAll();setMode('file');
</script>
